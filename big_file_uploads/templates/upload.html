<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Big File Upload</title>
</head>

<body>
    <h2>Upload slide</h2>

    <input id="file" type="file" />
    <button id="btn">Upload</button>

    <pre id="log"></pre>

    <script>
        function log(msg) {
            document.getElementById("log").textContent += msg + "\n";
        }

        // Django CSRF helper
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(";").shift();
        }

        document.getElementById("btn").addEventListener("click", async () => {
            const f = document.getElementById("file").files[0];
            if (!f) return alert("Pick a file first");

            const csrftoken = getCookie("csrftoken");

            log("1) Requesting upload URL from backend...");

            const r1 = await fetch("/api/upload/request-url", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": csrftoken
                },
                body: JSON.stringify({ filename: f.name, file_size: f.size })
            });

            if (!r1.ok) {
                log("Failed to get upload URL");
                log(await r1.text());
                return;
            }

            const { upload_url, blob_name } = await r1.json();
            log("2) Got SAS upload URL. Uploading directly to Blob Storage...");
            log("   blob_name = " + blob_name);

            // ⚠️ This simple PUT may be OK for learning, but very large files can be unreliable.
            // Production: use Azure SDK in browser for chunked block uploads.
            try {
                fetch(upload_url, {
                    method: "PUT",
                    headers: {
                        "x-ms-blob-type": "BlockBlob",
                        "Content-Type": f.type || "application/octet-stream"
                    },
                    body: f
                }).then(async (r2) => {
                    if (!r2.ok) {
                        log("Upload to blob failed");
                        log(await r2.text());
                        return;
                    }

                    const etag = r2.headers.get("etag");
                    log("3) Upload complete. Notifying backend...");

                    return fetch("/api/upload/confirm", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "X-CSRFToken": csrftoken
                        },
                        body: JSON.stringify({ blob_name, etag })
                    });
                }).then(async (r3) => {
                    if (!r3.ok) {
                        log("Confirm failed");
                        log(await r3.text());
                        return;
                    }

                    const out = await r3.json();
                    log("✅ Done. Saved blob_url in DB:");
                    log(out.blob_url);
                });
            }
            catch (error) {
                log("Upload to blob failed");
                log(error);
            }
        });
    </script>
</body>

</html>
